<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- convertFlow app icon
       Background: deep, slightly cool dark with subtle vertical gradient
       Foreground: the convert glyph (lines + asterisk + arrow) in warm amber
       Inspired by the existing logo.svg (sparkle → flow → arrow)
       Designed to read at 32px and look rich at 1024px -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a1f28"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#f0b85a"/>
      <stop offset="100%" stop-color="#c88a3a"/>
    </linearGradient>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background (Apple-style super-ellipse approximated with rx) -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bgGrad)"/>

  <!-- Subtle inner highlight ring for depth -->
  <rect x="3" y="3" width="1018" height="1018" rx="222" ry="222"
        fill="none" stroke="#2a2f3a" stroke-width="2" opacity="0.6"/>

  <!-- Soft accent glow behind the glyph -->
  <circle cx="512" cy="512" r="240" fill="#e0a84e" opacity="0.06" filter="url(#glow)"/>

  <!-- Main convert glyph: scaled-up version of public/logo.svg
       Original viewBox is 0 0 24 24; we map it to roughly (208–816, 208–816)
       so the glyph is centered at 512,512 and ~608px wide.
       That keeps the icon safe at 32px and substantial at 1024px. -->
  <g stroke="url(#accentGrad)"
     stroke-width="44"
     stroke-linecap="round"
     stroke-linejoin="round"
     fill="none"
     filter="url(#innerShadow)">
    <!-- Left "sparkle" / asterisk symbol -->
    <line x1="208" y1="512" x2="360" y2="512"/>
    <line x1="284" y1="436" x2="284" y2="588"/>
    <line x1="228.4" y1="456.4" x2="339.6" y2="567.6"/>
    <line x1="339.6" y1="456.4" x2="228.4" y2="567.6"/>
    <!-- Connecting flow line + arrow head pointing right -->
    <line x1="410" y1="512" x2="664" y2="512"/>
    <polyline points="588,436 664,512 588,588"/>
  </g>

  <!-- Tiny floor reflection — adds polish at large sizes, invisible at small -->
  <ellipse cx="512" cy="900" rx="180" ry="6"
           fill="#e0a84e" opacity="0.05"/>
</svg>
