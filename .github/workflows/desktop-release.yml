name: Desktop release

# Builds installers for Windows, macOS, and Linux on every tag push.
# Triggered by pushing a tag like v0.1.0:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   For unsigned builds — none. Workflow will still produce installers,
#   but users will see SmartScreen / Gatekeeper warnings.
#
#   For signed builds — set these once and the workflow signs automatically:
#     TAURI_SIGNING_PRIVATE_KEY        — base64 of the Tauri updater key
#     TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password for that key
#     APPLE_ID                          — Apple ID email
#     APPLE_PASSWORD                    — app-specific password
#     APPLE_TEAM_ID                     — Apple Developer team ID
#     APPLE_CERTIFICATE                 — base64 of the .p12 macOS cert
#     APPLE_CERTIFICATE_PASSWORD        — password for the .p12
#     WINDOWS_CERTIFICATE               — base64 of the .pfx Windows cert
#     WINDOWS_CERTIFICATE_PASSWORD      — password for the .pfx

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-14"
            args: "--target universal-apple-darwin"
            label: "macos"
          - platform: "ubuntu-24.04"
            args: ""
            label: "linux"
          - platform: "windows-latest"
            args: ""
            label: "windows"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # macOS: bypass dtolnay/rust-toolchain — the runner image leaves
      # `cargo` resolving to rustup-init, causing "unexpected argument
      # 'metadata' found". Install Rust via the official rustup script,
      # which wires up cargo/rustc symlinks correctly.
      - name: Install Rust stable (macOS)
        if: matrix.platform == 'macos-14'
        run: |
          rm -rf "$HOME/.cargo" "$HOME/.rustup"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal \
              --target aarch64-apple-darwin --target x86_64-apple-darwin
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" show
          "$HOME/.cargo/bin/cargo" --version
          "$HOME/.cargo/bin/rustc" --version

      - name: Install Rust stable (non-macOS)
        if: matrix.platform != 'macos-14'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm deps
        run: npm ci

      # Code-signing env vars are intentionally NOT passed here while we
      # ship unsigned binaries. GitHub Actions resolves unset secrets to
      # empty strings, which tauri-action treats as "signing requested with
      # an empty cert" and crashes at `security import`. By omitting the
      # env block we get clean unsigned builds for all three platforms.
      #
      # When you're ready to sign (Apple Developer cert + Windows EV cert),
      # uncomment the env block below and add the matching repo secrets.
      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- signing (uncomment when secrets are set) -----------------
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "convertFlow ${{ github.ref_name }}"
          releaseBody: "See the release notes on https://convertflow.live."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
